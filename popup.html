<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SAM Table Filter</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Icon sprite (Lucide-style, stroke = currentColor) -->
  <svg hidden aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
    <symbol id="i-logo" viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></symbol>
    <symbol id="i-x" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></symbol>
    <symbol id="i-refresh" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.64-6.36L21 8"/><path d="M21 3v5h-5"/></symbol>
    <symbol id="i-settings" viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></symbol>
    <symbol id="i-dashboard" viewBox="0 0 24 24"><rect width="7" height="9" x="3" y="3" rx="1.5"/><rect width="7" height="5" x="14" y="3" rx="1.5"/><rect width="7" height="9" x="14" y="12" rx="1.5"/><rect width="7" height="5" x="3" y="16" rx="1.5"/></symbol>
    <symbol id="i-star" viewBox="0 0 24 24"><path d="m12 2 3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></symbol>
    <symbol id="i-copy" viewBox="0 0 24 24"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></symbol>
    <symbol id="i-external" viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></symbol>
    <symbol id="i-back" viewBox="0 0 24 24"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></symbol>
    <symbol id="i-chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></symbol>
    <symbol id="i-layers" viewBox="0 0 24 24"><path d="m12 2 8.5 4.5L12 11 3.5 6.5z"/><path d="m3.5 12 8.5 4.5 8.5-4.5"/><path d="m3.5 17.5 8.5 4.5 8.5-4.5"/></symbol>
    <symbol id="i-trend-up" viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></symbol>
    <symbol id="i-hold" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></symbol>
    <symbol id="i-slice" viewBox="0 0 24 24"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></symbol>
    <symbol id="i-stop" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></symbol>
    <symbol id="i-dot" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></symbol>
    <symbol id="i-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></symbol>
    <symbol id="i-moon" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></symbol>
    <symbol id="i-monitor" viewBox="0 0 24 24"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8M12 17v4"/></symbol>
    <symbol id="i-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="3" y2="15"/></symbol>
    <symbol id="i-alert" viewBox="0 0 24 24"><path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3z"/><path d="M12 9v4"/><path d="M12 17h.01"/></symbol>
    <symbol id="i-inbox" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></symbol>
  </svg>

  <header class="topbar">
    <div class="brand">
      <div class="logo" aria-hidden="true"><svg class="i"><use href="#i-logo"/></svg></div>
      <div class="brand-text">
        <h1>SAM Table</h1>
        <span id="meta" class="meta">&nbsp;</span>
      </div>
    </div>
    <div class="topactions">
      <button id="refreshBtn" class="iconbtn" title="Refresh data" aria-label="Refresh data">
        <svg class="i"><use href="#i-refresh"/></svg>
      </button>
      <button id="settingsBtn" class="iconbtn" title="Settings" aria-label="Open settings">
        <svg class="i"><use href="#i-settings"/></svg>
      </button>
    </div>
  </header>

  <div id="staleNote" class="stale" hidden>
    <svg class="i" aria-hidden="true"><use href="#i-alert"/></svg>
    <span id="staleMsg"></span>
  </div>

  <!-- Dashboard -->
  <main id="viewDashboard" class="view" data-view="dashboard">
    <section id="stats" class="stats" aria-label="Quick statistics"></section>

    <section class="controls">
      <div class="searchbox">
        <svg class="i" aria-hidden="true"><use href="#i-search"/></svg>
        <input id="search" type="search" placeholder="Search stock…" autocomplete="off" aria-label="Search stocks" />
        <button id="clearSearch" class="clearbtn" hidden aria-label="Clear search">
          <svg class="i"><use href="#i-x"/></svg>
        </button>
      </div>
      <div class="row">
        <div class="selectwrap">
          <select id="categorySel" aria-label="Filter by category">
            <option value="all">All categories</option>
          </select>
        </div>
        <div class="selectwrap">
          <select id="sortSel" aria-label="Sort">
            <option value="default">Page order</option>
            <option value="growth">Growth ↓</option>
            <option value="dividend">Dividend ↓</option>
            <option value="fromTarget">Below target</option>
            <option value="code">Code A–Z</option>
          </select>
        </div>
      </div>
      <div id="actionChips" class="chips" role="group" aria-label="Filter by action"></div>
    </section>

    <div id="skeleton" class="list" hidden aria-hidden="true"></div>
    <div id="list" class="list"></div>

    <div id="empty" class="empty" hidden>
      <div class="empty-icon"><svg class="i"><use href="#i-inbox"/></svg></div>
      <p id="emptyMsg">Open the SAM Table page, then refresh.</p>
      <div class="empty-actions">
        <button id="emptyRefresh" class="btn primary">Refresh</button>
        <a class="btn ghost" href="https://members.trulyrichclub.com/member/recommendations/sam" target="_blank" rel="noopener">Open SAM Table <svg class="i"><use href="#i-external"/></svg></a>
      </div>
    </div>
  </main>

  <!-- Favorites -->
  <main id="viewFavorites" class="view" data-view="favorites" hidden>
    <h2 class="view-title">Favorites</h2>
    <div id="favList" class="list"></div>
    <div id="favEmpty" class="empty" hidden>
      <div class="empty-icon"><svg class="i"><use href="#i-star"/></svg></div>
      <p>No favorites yet.<br />Tap the star on any stock to pin it here.</p>
    </div>
  </main>

  <!-- Settings -->
  <main id="viewSettings" class="view" data-view="settings" hidden>
    <h2 class="view-title">Settings</h2>

    <section class="group">
      <h3 class="group-title">Appearance</h3>
      <div class="setting">
        <span class="setting-label">Theme</span>
        <div class="segmented" id="themeSeg" role="radiogroup" aria-label="Theme">
          <button data-theme-opt="light" role="radio" aria-checked="false"><svg class="i"><use href="#i-sun"/></svg>Light</button>
          <button data-theme-opt="dark" role="radio" aria-checked="false"><svg class="i"><use href="#i-moon"/></svg>Dark</button>
          <button data-theme-opt="system" role="radio" aria-checked="true"><svg class="i"><use href="#i-monitor"/></svg>Auto</button>
        </div>
      </div>
      <div class="setting">
        <span class="setting-label">Density</span>
        <div class="segmented" id="densitySeg" role="radiogroup" aria-label="List density">
          <button data-density-opt="compact" role="radio" aria-checked="false">Compact</button>
          <button data-density-opt="comfortable" role="radio" aria-checked="true">Comfortable</button>
        </div>
      </div>
    </section>

    <section class="group">
      <h3 class="group-title">Data</h3>
      <div class="setting">
        <div>
          <span class="setting-label">Export CSV</span>
          <span class="setting-hint">Download the currently filtered list</span>
        </div>
        <button id="exportBtn" class="btn ghost"><svg class="i"><use href="#i-download"/></svg>Export</button>
      </div>
      <div class="setting">
        <div>
          <span class="setting-label">Source</span>
          <span class="setting-hint" id="sourceHint">—</span>
        </div>
        <a class="btn ghost" href="https://members.trulyrichclub.com/member/recommendations/sam" target="_blank" rel="noopener">Open <svg class="i"><use href="#i-external"/></svg></a>
      </div>
    </section>

    <section class="group">
      <h3 class="group-title">About</h3>
      <div class="setting">
        <span class="setting-label">SAM Table Filter</span>
        <span class="setting-hint" id="versionHint">v1.0.0</span>
      </div>
    </section>
  </main>

  <!-- Detail panel -->
  <aside id="detail" class="detail" hidden aria-label="Stock details">
    <header class="detail-top">
      <button id="detailBack" class="iconbtn" aria-label="Back">
        <svg class="i"><use href="#i-back"/></svg>
      </button>
      <span class="detail-top-title">Details</span>
      <button id="detailFav" class="iconbtn fav" aria-label="Toggle favorite" aria-pressed="false">
        <svg class="i"><use href="#i-star"/></svg>
      </button>
    </header>
    <div id="detailBody" class="detail-body"></div>
  </aside>

  <nav class="bottomnav" aria-label="Main navigation">
    <button class="navbtn active" data-nav="dashboard" aria-current="page">
      <svg class="i"><use href="#i-dashboard"/></svg><span>Dashboard</span>
    </button>
    <button class="navbtn" data-nav="favorites">
      <svg class="i"><use href="#i-star"/></svg><span>Favorites</span>
      <em id="favBadge" class="navdot" hidden></em>
    </button>
    <button class="navbtn" data-nav="settings">
      <svg class="i"><use href="#i-settings"/></svg><span>Settings</span>
    </button>
  </nav>

  <div id="toast" class="toast" hidden role="status"></div>

  <script src="parser.js"></script>
  <script src="popup.js"></script>
</body>
</html>
